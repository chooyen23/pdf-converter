<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}PDF Converter{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; }
    .navbar-brand { font-weight: 700; letter-spacing: -0.5px; }
    .tool-card { transition: transform .15s, box-shadow .15s; cursor: pointer; }
    .tool-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,.1); }
    .output-box { background: #1e1e1e; color: #d4d4d4; font-size: .8rem; border-radius: 6px; max-height: 200px; overflow-y: auto; }
    .spinner-overlay { display: none; position: fixed; inset: 0; background: rgba(255,255,255,.7); z-index: 9999; align-items: center; justify-content: center; }
    .spinner-overlay.active { display: flex; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/"><i class="bi bi-file-earmark-pdf me-2"></i>PDF Tools</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/extractor">Extract</a></li>
        <li class="nav-item"><a class="nav-link" href="/inventory">Inventory</a></li>
        <li class="nav-item"><a class="nav-link" href="/marker">Mark</a></li>
        <li class="nav-item"><a class="nav-link" href="/merge-split">Merge/Split</a></li>
        <li class="nav-item"><a class="nav-link" href="/redactor">Redact</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="spinner-overlay" id="spinner">
  <div class="text-center">
    <div class="spinner-border text-dark mb-2" style="width:3rem;height:3rem;"></div>
    <div class="fw-semibold">Processing…</div>
  </div>
</div>

<div class="container py-4">
  {% with messages = get_flashed_messages() %}
    {% if messages %}
      {% for msg in messages %}
        <div class="alert alert-warning alert-dismissible fade show">{{ msg }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
      {% endfor %}
    {% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
