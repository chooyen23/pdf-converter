{% extends "base.html" %}
{% block title %}Inventory — PDF Tools{% endblock %}
{% block content %}
<div class="row mb-3">
  <div class="col">
    <a href="/" class="text-decoration-none text-muted small"><i class="bi bi-arrow-left me-1"></i>Back</a>
    <h2 class="h4 fw-bold mt-1">PDF Inventory</h2>
  </div>
</div>

<div class="card p-4 mb-4">
  <form method="POST" enctype="multipart/form-data" class="pdf-form">
    <div class="mb-3">
      <label class="form-label fw-semibold">PDF file(s)</label>
      <input type="file" name="pdfs" class="form-control" accept=".pdf" multiple required>
      <div class="form-text">Upload all PDFs you want to inventory at once.</div>
    </div>

    <div class="row g-3 mb-3">
      <div class="col-md-4">
        <label class="form-label fw-semibold">Sample pages for text detection</label>
        <input type="number" name="sample_pages" class="form-control" value="3" min="1" max="20">
      </div>
      <div class="col-md-4 d-flex align-items-end">
        <div class="form-check mb-1">
          <input class="form-check-input" type="checkbox" name="recursive" id="recursive">
          <label class="form-check-label" for="recursive">Include subfolders</label>
        </div>
      </div>
    </div>

    <button type="submit" class="btn btn-success">
      <i class="bi bi-play-fill me-1"></i>Generate Inventory
    </button>
  </form>
</div>

{% if links is defined %}
  {% include "_results.html" %}
{% endif %}
{% endblock %}
