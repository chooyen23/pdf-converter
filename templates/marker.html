{% extends "base.html" %}
{% block title %}Mark — PDF Tools{% endblock %}
{% block content %}
<div class="row mb-3">
  <div class="col">
    <a href="/" class="text-decoration-none text-muted small"><i class="bi bi-arrow-left me-1"></i>Back</a>
    <h2 class="h4 fw-bold mt-1">Watermark / Stamp / Page Numbers</h2>
  </div>
</div>

<div class="card p-4 mb-4">
  <form method="POST" enctype="multipart/form-data" class="pdf-form">
    <div class="mb-3">
      <label class="form-label fw-semibold">PDF file(s)</label>
      <input type="file" name="pdfs" class="form-control" accept=".pdf" multiple required>
    </div>

    <div class="row g-3 mb-3">
      <div class="col-md-4">
        <label class="form-label fw-semibold">Mode</label>
        <select name="mode" class="form-select" id="markerMode">
          <option value="watermark" selected>Watermark</option>
          <option value="stamp">Stamp</option>
          <option value="page-numbers">Page Numbers</option>
        </select>
      </div>
    </div>

    <div id="textOptions">
      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <label class="form-label fw-semibold">Text</label>
          <input type="text" name="text" class="form-control" value="CONFIDENTIAL">
        </div>
        <div class="col-md-3">
          <label class="form-label fw-semibold">Color (hex)</label>
          <input type="color" name="color" class="form-control form-control-color" value="#CCCCCC" style="height:38px">
        </div>
        <div class="col-md-3">
          <label class="form-label fw-semibold">Font size</label>
          <input type="number" name="font_size" class="form-control" value="48" min="8" max="200">
        </div>
      </div>
      <div class="row g-3 mb-3">
        <div class="col-md-4">
          <label class="form-label fw-semibold">Position</label>
          <select name="position" class="form-select">
            <option value="center" selected>Center</option>
            <option value="top-left">Top Left</option>
            <option value="top-center">Top Center</option>
            <option value="top-right">Top Right</option>
            <option value="bottom-left">Bottom Left</option>
            <option value="bottom-center">Bottom Center</option>
            <option value="bottom-right">Bottom Right</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label fw-semibold">Angle (degrees)</label>
          <input type="number" name="angle" class="form-control" value="45" min="0" max="360">
        </div>
        <div class="col-md-4">
          <label class="form-label fw-semibold">Opacity (0–1)</label>
          <input type="number" name="opacity" class="form-control" value="0.12" min="0" max="1" step="0.01">
        </div>
      </div>
    </div>

    <div id="pageNumOptions" style="display:none">
      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <label class="form-label fw-semibold">Format string</label>
          <input type="text" name="page_num_fmt" class="form-control" value="Page {n} of {total}">
        </div>
        <div class="col-md-3">
          <label class="form-label fw-semibold">Font size</label>
          <input type="number" name="page_num_size" class="form-control" value="10" min="6" max="48">
        </div>
        <div class="col-md-3">
          <label class="form-label fw-semibold">Position</label>
          <select name="position" class="form-select">
            <option value="bottom-center" selected>Bottom Center</option>
            <option value="bottom-left">Bottom Left</option>
            <option value="bottom-right">Bottom Right</option>
            <option value="top-center">Top Center</option>
          </select>
        </div>
      </div>
    </div>

    <button type="submit" class="btn btn-warning">
      <i class="bi bi-play-fill me-1"></i>Apply
    </button>
  </form>
</div>

{% if links is defined %}
  {% include "_results.html" %}
{% endif %}
{% endblock %}
